name: QuantumRx Refresh

# Manual-only backup for the site's refresh endpoints (all times UTC).
#   - daily  -> news, draw, mainstream, cartoon, meme
#   - weekly -> weekly (This Week), podcast (Top 50)
# Run it by hand from the Actions tab (Run workflow -> pick task).
#
# PATCH 2026-07-13 — the `schedule:` trigger has been removed. Railway
# (railway-cron/) is now the primary trigger, running daily at 06:17 UTC and
# also firing the weekly bucket on Mondays. Keeping GitHub's own schedule
# alongside it caused the two to race each other on Mondays: Railway's
# 06:17 UTC run refreshed `weekly-refresh` first, then GitHub's own
# 08:17 UTC schedule (itself running hours late, same delay problem this
# workflow always had) tried to refresh it again and got rejected by
# weekly-refresh's cooldown (429 "Too soon since last refresh"), reporting
# a false failure even though the site data was already fresh. This
# workflow now only runs when triggered manually.
#
# SETUP (one-time):
#   GitHub repo -> Settings -> Secrets and variables -> Actions ->
#   New repository secret -> name: CRON_SECRET, value: <same secret as Vercel>

on:
  workflow_dispatch:
    inputs:
      task:
        description: Which bucket to run
        type: choice
        options: [daily, weekly]
        default: daily

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh endpoints
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TASK: ${{ github.event.inputs.task }}
          BASE: https://forge.quantumrx.eu
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repository secret is not set."
            exit 1
          fi

          if [ "$TASK" = "weekly" ]; then
            ENDPOINTS="weekly-refresh podcast-refresh"
          else
            ENDPOINTS="news-refresh draw-refresh mainstream-refresh generate-chat-chips cartoon-refresh meme-refresh"
          fi

          echo "Running '$TASK' refresh -> $ENDPOINTS"
          fail=0
          for ep in $ENDPOINTS; do
            code=$(curl -sS -o /tmp/body -w '%{http_code}' -X POST "$BASE/api/$ep" \
              -H "x-cron-secret: $CRON_SECRET" \
              -H "Authorization: Bearer $CRON_SECRET" || echo "000")
            body=$(tr -d '\n' < /tmp/body | head -c 200)
            if [ "$code" = "200" ]; then
              echo "[OK ] $ep $code $body"
            else
              echo "::warning::$ep returned $code $body"
              echo "[ERR] $ep $code $body"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more refresh endpoints failed."
            exit 1
          fi
          echo "All '$TASK' refreshes succeeded."
