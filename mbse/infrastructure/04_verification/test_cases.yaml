# Infrastructure — Test Cases
# Schema per Medha MBSE _framework/schemas/test_case.schema.yaml, consolidated.
# Every "last_run_result" below reflects the live 2026-07-20 audit and is
# also what crawler.py automates for repeat checks.

test_cases:

  - id: INFRA-TC-001
    title: Daily cron fan-out fires and succeeds
    verifies: [INFRA-STK-001, INFRA-SYS-001, INFRA-SYS-003]
    type: INTEGRATION
    method: TEST
    preconditions: ["CRON_SECRET valid on both Railway and Vercel"]
    test_data: {endpoint: "POST https://forge.quantumrx.eu/api/cron-daily"}
    procedure:
      - "Fetch /api/cartoon, /api/meme, /api/news-feed, /api/draw-feed, /api/mainstream-feed"
      - "Compare each response's date/updated timestamp to today's date"
      - "Confirm all timestamps cluster around 06:17-06:25 UTC"
    expected_result: All five feeds show today's date, timestamps within ~10 minutes of each other.
    pass_criteria:
      - "date/issueNumber advances daily without manual trigger"
      - "all timestamps consistent with a single fan-out run, not scattered/duplicate runs"
    status: PASSED
    last_run_date: 2026-07-20
    last_run_result: "All 5 feeds dated 2026-07-19 (day before check), updated 06:19-06:21 UTC cluster. Today's run pending at check time (05:49 UTC, before 06:17 schedule)."
    phase: v1

  - id: INFRA-TC-002
    title: Weekly cron fan-out fires on Mondays
    verifies: [INFRA-STK-001, INFRA-SYS-004]
    type: INTEGRATION
    method: TEST
    preconditions: ["Run date is a Monday (UTC)"]
    test_data: {endpoint: "POST https://forge.quantumrx.eu/api/cron-weekly"}
    procedure:
      - "Fetch /api/weekly-feed and /api/podcast-feed"
      - "Confirm current.updatedAt matches the most recent Monday's date, ~06:17-06:25 UTC"
    expected_result: Weekly content updates once per week, on Monday, without manual trigger.
    pass_criteria: ["updatedAt timestamp falls on a Monday within the expected time window"]
    status: PASSED
    last_run_date: 2026-07-20
    last_run_result: "weekly-feed updatedAt 2026-07-13T06:23:12Z (correct Monday, correct time window)."
    phase: v1

  - id: INFRA-TC-003
    title: GitHub Actions has no active schedule trigger
    verifies: [INFRA-STK-004, INFRA-SYS-002]
    type: INSPECTION
    method: INSPECTION
    preconditions: ["GitHub PAT with actions:read scope"]
    test_data: {api: "GET /repos/QuantumRX-lab/Qrx_MARK_T2/actions/workflows/refresh.yml/runs"}
    procedure:
      - "List recent workflow runs"
      - "Confirm no run has event=schedule dated after 2026-07-13"
    expected_result: No scheduled runs; only workflow_dispatch runs, if any.
    pass_criteria: ["zero schedule-triggered runs after 2026-07-13T11:31:02Z"]
    status: PASSED
    last_run_date: 2026-07-20
    last_run_result: "Most recent run still 2026-07-13T11:31:02Z (the failure that triggered the disable). Clean for a full week."
    phase: v1

  - id: INFRA-TC-004
    title: VPS services active, disk within headroom
    verifies: [INFRA-SYS-010]
    type: SYSTEM
    method: TEST
    preconditions: ["SSH access to root@91.99.127.39"]
    test_data: {services: ["mip-api", "mip-worker", "nginx"]}
    procedure:
      - "systemctl is-active for each service"
      - "df -h / for disk usage percentage"
    expected_result: All services 'active'; disk usage below 90%.
    pass_criteria: ["all 3 services report active", "disk use% < 90"]
    status: PASSED
    last_run_date: 2026-07-20
    last_run_result: "All active. Disk 68% (25GB/38GB)."
