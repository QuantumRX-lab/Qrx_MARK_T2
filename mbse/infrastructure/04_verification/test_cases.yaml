  - id: INFRA-TC-008
    title: A false-positive Sentinel block can be cleared without a deploy
    verifies: [INFRA-STK-005, INFRA-SYS-009]
    type: DEMONSTRATION
    method: DEMONSTRATION
    preconditions: ["Upstash REST token"]
    test_data: {example_ip: "75.11.11.78"}
    procedure:
      - "POST {KV_URL}/del/threat_action:<ip>"
      - "POST {KV_URL}/del/threat:flag:<ip>"
      - "Re-GET both keys, confirm null"
    expected_result: Block cleared immediately, no deploy required.
    pass_criteria: ["both keys return null after DEL"]
    status: PASSED
    last_run_date: 2026-07-16
    last_run_result: "Cleared successfully 3 separate times this session (2026-07-11, twice; 2026-07-16)."
    phase: v1

  - id: INFRA-TC-009
    title: GA4 tags load once per page, correct measurement ID, no CSP block
    verifies: [INFRA-SYS-007, INFRA-SYS-008]
    type: SYSTEM
    method: TEST
    preconditions: []
    test_data: {pages: "all forge.quantumrx.eu + quantumrx.eu pages, plus quantumrx.co.uk"}
    procedure:
      - "curl each page, count occurrences of googletagmanager.com/gtag/js"
      - "curl -I each domain, inspect Content-Security-Policy header for googletagmanager/google-analytics allowlisting"
    expected_result: Exactly 1 load per page; correct ID per brand; no CSP block.
    pass_criteria: ["count == 1 on every page", "CSP allows required domains or is absent"]
    status: PASSED
    last_run_date: 2026-07-16
    last_run_result: "All forge/eu pages: G-YPMBJ71VTF x1. co.uk: G-8C097TY3ZJ x1. No CSP blocking."
    phase: v1

  - id: INFRA-TC-010
    title: Ghost site-wide Code Injection is not Admin-API-writable
    verifies: [INFRA-SYS-011]
    type: DEMONSTRATION
    method: DEMONSTRATION
    preconditions: ["Valid Ghost Admin API key"]
    test_data: {endpoint: "PUT /ghost/api/admin/settings/", key: "codeinjection_head"}
    procedure: ["Attempt the PUT with a valid JWT", "Record response"]
    expected_result: Either succeeds, or fails with a clear permission error.
    pass_criteria: ["response is 403 NoPermissionError (confirms manual-only, not a bug on our side)"]
    status: PASSED
    last_run_date: 2026-07-16
    last_run_result: "403 NoPermissionError, confirmed. Manual paste required and used successfully instead."
    phase: v1

