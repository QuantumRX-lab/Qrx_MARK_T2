  - id: INFRA-TC-005
    title: Every Vercel env var used by api/*.js is actually configured
    verifies: [INFRA-STK-002, INFRA-SYS-005]
    type: INSPECTION
    method: INSPECTION
    preconditions: ["vercel CLI authenticated to the project"]
    test_data: {}
    procedure:
      - "grep -rhoE 'process\\.env\\.[A-Za-z_][A-Za-z0-9_]*' api/ | sort -u"
      - "vercel env ls"
      - "Diff the two lists"
    expected_result: Every referenced variable name appears in the configured list.
    pass_criteria: ["zero referenced-but-not-configured variables"]
    status: PASSED
    last_run_date: 2026-07-20
    last_run_result: >
      RE-RUN after action: the 5 previously-missing vars were required only
      by api/ls-webhook.js, confirmed an unused stub and deleted. Re-running
      the diff now shows zero referenced-but-missing variables.
    defects_raised: [RISK-INFRA-004]
    phase: v1

  - id: INFRA-TC-006
    title: Every configured Vercel env var is used by some code path
    verifies: [INFRA-STK-002, INFRA-SYS-005]
    type: INSPECTION
    method: INSPECTION
    preconditions: ["Same data as INFRA-TC-005"]
    test_data: {}
    procedure: ["Same diff as INFRA-TC-005, reverse direction"]
    expected_result: Every configured variable name is referenced somewhere in api/*.js.
    pass_criteria: ["zero configured-but-unused variables, OR any exception explicitly confirmed intentional by the owner"]
    status: PASSED
    last_run_date: 2026-07-20
    last_run_result: >
      ANTHROPIC_API_KEY remains configured and unreferenced by deployed
      code, but the owner confirmed 2026-07-20 this is intentional
      (occasional/manual use outside the committed codebase) — accepted as
      a documented exception rather than a defect.
    defects_raised: [RISK-INFRA-006]
    phase: v1

  - id: INFRA-TC-007
    title: "[SUPERSEDED] ls-webhook.js correctly handles a real order_created payload"
    verifies: [INFRA-STK-003, INFRA-SYS-006]
    type: INTEGRATION
    method: TEST
    preconditions: ["N/A — file deleted"]
