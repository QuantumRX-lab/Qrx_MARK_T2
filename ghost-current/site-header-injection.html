<script>
(function () {
  var IMG = 'https://storage.ghost.io/c/08/be/08be680d-f37c-44dd-98a9-d496fb40d8de/content/images/2026/06/quantumrx-hero-1600w-under-300kb.webp';
  var injected = false;

  function buildHero() {
    if (injected) return;
    if (!document.body.classList.contains('home-template')) return;

    var viewport = document.querySelector('.gh-viewport');
    if (!viewport) return;
    injected = true;

    var preload = new Image();
    preload.src = IMG;

    var hero = document.createElement('div');
    hero.className = 'qrx-hero';

    hero.innerHTML =
      '<div class="qrx-hero-inner">' +
        '<h1 class="qrx-hero-title">Follow the signals. Understand the future.</h1>' +
        '<p class="qrx-hero-sub">QuantumRx tracks AI infrastructure, agentic systems, edge compute, satcom, robotics and deployment tools. Built from the field, not from the sidelines.</p>' +
        '<div class="qrx-subscribe-form">' +
          '<input type="email" class="qrx-email-input" placeholder="Enter your email address" autocomplete="email" />' +
          '<button class="qrx-subscribe-btn">Subscribe Free</button>' +
        '</div>' +
        '<div class="qrx-tools-row">' +
          '<a class="qrx-tools-link" href="/signals/">AI &amp; Tech →</a>' +
          '<a class="qrx-tools-link" href="/this-week-in-tech/">Week in Review →</a>' +
          '<a class="qrx-tools-link" href="/mainstream/">Top Headlines →</a>' +
          '<a class="qrx-tools-link" href="/the-draw/">World &amp; Markets →</a>' +
          '<a class="qrx-tools-link" href="https://forge.quantumrx.eu/exploit-watch.html">Security Feed →</a>' +
          '<a class="qrx-tools-link" href="/products/">Products →</a>' +
        '</div>' +
      '</div>' +
      '<div class="qrx-credits">' +
        '<div>Copyright &copy; 2026 QuantumRX &mdash; All rights reserved</div>' +
        '<div>71-75 Shelton Street, Covent Garden, London, WC2H 9JQ, United Kingdom</div>' +
        '<div>Contact: <a href="mailto:info@quantumrx.eu">info@quantumrx.eu</a> &middot; <a href="https://www.quantumrx.eu/terms-conditions/">Terms &amp; Conditions</a></div>' +
      '</div>';

    var nav = viewport.querySelector('.gh-navigation');
    if (nav) {
      viewport.insertBefore(hero, nav.nextSibling);
    } else {
      viewport.insertBefore(hero, viewport.firstChild);
    }

    var btn   = hero.querySelector('.qrx-subscribe-btn');
    var input = hero.querySelector('.qrx-email-input');

    btn.addEventListener('click', function () {
      var email = input.value.trim();
      if (email && email.indexOf('@') > -1) {
        window.location.href = '#/portal/signup?email=' + encodeURIComponent(email);
      } else {
        input.focus();
      }
    });

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') btn.click();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildHero);
  } else {
    buildHero();
  }

  window.addEventListener('load', buildHero);

  var obs = new MutationObserver(function () {
    if (document.querySelector('.gh-viewport') && document.body.classList.contains('home-template')) {
      buildHero();
      if (injected) obs.disconnect();
    }
  });
  obs.observe(document.documentElement, { childList: true, subtree: true });
})();
</script>

  @media (max-width:640px){
    .qrx-front-inner{ padding:20px 16px 38px; }
    .qrx-desk-head{ flex-direction:column; align-items:flex-start; gap:12px; }
    .qrx-desk-meta{ justify-content:flex-start; white-space:normal; }
    .qrx-lead-panel h2{ font-size:1.55rem; }
    .qrx-sector-strip{ grid-template-columns:1fr; }
    .qrx-main-grid{ grid-template-columns:1fr; }
    .qrx-section-head{ align-items:flex-start; flex-direction:column; gap:6px; }
    .qrx-featured-head span{ font-size:1.3rem; }
  }
</style>

<script>
(function () {
  var API = 'https://forge.quantumrx.eu';
  var built = false;
  var labeled = false;

  var SECTORS = [
    ['aimoves', 'AI Moves'],
    ['semis', 'Semis'],
    ['space', 'Space'],
    ['robotics', 'Robotics'],
    ['energy', 'Energy']
  ];

  var SKELETON =
    '<div class="qrx-front-inner">' +
      '<header class="qrx-desk-head">' +
        '<div>' +
          '<span class="qrx-desk-eyebrow">Live intelligence</span>' +
          '<h2>The Signal Desk</h2>' +
        '</div>' +
        '<div class="qrx-desk-meta">' +
          '<span class="qrx-live-pill"><span class="qrx-live-dot"></span>Live</span>' +
          '<span class="qrx-date"></span>' +
          '<a class="qrx-view-all" href="/signals/">View all signals →</a>' +
        '</div>' +
      '</header>' +

      '<div class="qrx-front-grid">' +
        '<article class="qrx-lead-panel"></article>' +
        '<aside class="qrx-live-rail">' +
          '<h3 class="qrx-rail-title">Live Signals</h3>' +
          '<div class="qrx-live-list"></div>' +
        '</aside>' +
        '<aside class="qrx-briefing-rail">' +
          '<h3 class="qrx-rail-title">This Week in Tech</h3>' +
          '<ol></ol>' +
        '</aside>' +
      '</div>' +

      '<section class="qrx-sector-wrap">' +
        '<div class="qrx-section-head">' +
          '<h3>Sector Watch</h3>' +
          '<span>AI · Semis · Space · Robotics · Energy</span>' +
        '</div>' +
        '<div class="qrx-sector-strip"></div>' +
      '</section>' +

      '<div class="qrx-lower-grid">' +
        '<section class="qrx-mainstream-zone">' +
          '<h3 class="qrx-zone-title">Mainstream Pulse</h3>' +
          '<div class="qrx-main-grid"></div>' +
        '</section>' +
        '<section class="qrx-draw-zone">' +
          '<h3 class="qrx-zone-title">The Draw — World &amp; Markets</h3>' +
          '<div class="qrx-draw-list"></div>' +
        '</section>' +
      '</div>' +

      '<section class="qrx-exploit-wrap">' +
        '<div class="qrx-section-head">' +
          '<h3>Exploit Watch</h3>' +
          '<span>New CVEs · PoC repos · advisories</span>' +
        '</div>' +
        '<div class="qrx-exploit-list"></div>' +
      '</section>' +
    '</div>';

  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function timeAgo(ms){
    if (!ms) return '';
    var diff = Date.now() - Number(ms);
    if (diff < 0 || !isFinite(diff)) return '';
    var m = Math.floor(diff / 60000);
    if (m < 60) return Math.max(1, m) + 'm ago';
    var h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  function clip(s, n){
    s = String(s || '');
    return s.length > n ? s.slice(0, n - 1).replace(/\s+\S*$/, '') + '…' : s;
  }

  function urlOf(it){ return (it && (it.url || it.link)) || ''; }
  function summaryOf(it){ return (it && (it.what_is_it || it.summary || it.description)) || ''; }
  function imgOf(it){
    var i = it && it.image;
    return (typeof i === 'string' && /^https?:\/\//.test(i)) ? i : '';
  }
  function href(it){ return esc(urlOf(it) || '#'); }
  function img(url, cls){ return url ? '<img class="' + cls + '" src="' + esc(url) + '" alt="" loading="lazy">' : ''; }
  function meta(it){ return [it && it.source, timeAgo(it && it.published)].filter(Boolean).join(' · '); }
  function kicker(it, fallback){
    var m = meta(it);
    return esc(m || fallback || 'Signals');
  }

  function getJSON(url){
    return fetch(url, { credentials:'omit' }).then(function (r) {
      if (!r.ok) throw new Error('bad status');
      return r.json();
    });
  }

  function wireImgs(front){
    front.querySelectorAll('img').forEach(function (im) {
      if (im.__qrxWired) return;
      im.__qrxWired = true;
      im.addEventListener('error', function () { im.style.display = 'none'; });
    });
  }

  function removeZone(front, sel){
    var n = front.querySelector(sel);
    if (n) n.remove();
  }

  function renderTop(front, items){
    var leadWrap = front.querySelector('.qrx-lead-panel');
    var liveWrap = front.querySelector('.qrx-live-list');
    if (!leadWrap || !liveWrap || !items.length) return false;

    var lead = items[0];
    var sm = summaryOf(lead);
    leadWrap.innerHTML =
      '<a href="' + href(lead) + '" target="_blank" rel="noopener">' +
        img(imgOf(lead), 'qrx-lead-img') +
        '<span class="qrx-kicker">' + kicker(lead, 'Top Signal') + '</span>' +
        '<h2>' + esc(lead.title || '') + '</h2>' +
        (sm ? '<p>' + esc(clip(sm, 190)) + '</p>' : '') +
        '<span class="qrx-read-source">Read source →</span>' +
      '</a>';

    var live = items.slice(1, 7);
    if (!live.length) {
      removeZone(front, '.qrx-live-rail');
    } else {
      liveWrap.innerHTML = live.map(function (it) {
        return '<a class="qrx-news-row" href="' + href(it) + '" target="_blank" rel="noopener">' +
          '<strong>' + esc(it.title || '') + '</strong>' +
          '<span class="qrx-news-meta">' + kicker(it, 'Signals') + '</span>' +
        '</a>';
      }).join('');
    }

    wireImgs(front);
    return true;
  }

  function renderWeekly(front, stories){
    var rail = front.querySelector('.qrx-briefing-rail');
    var ol = front.querySelector('.qrx-briefing-rail ol');
    var top = (stories || []).slice(0, 5);
    if (!rail || !ol) return;
    if (!top.length) { rail.remove(); return; }

    ol.innerHTML = top.map(function (s) {
      return '<li><a class="qrx-brief-row" href="/this-week-in-tech/">' +
        '<span class="qrx-brief-num"></span>' +
        '<span>' +
          '<span class="qrx-brief-cat">' + esc(s.category || 'Briefing') + '</span>' +
          '<span class="qrx-brief-title">' + esc(s.title || '') + '</span>' +
        '</span>' +
      '</a></li>';
    }).join('');
  }

  function renderSectorCards(front, cards){
    var wrap = front.querySelector('.qrx-sector-strip');
    var items = (cards || []).filter(Boolean);
    if (!wrap) return;
    if (!items.length) { removeZone(front, '.qrx-sector-wrap'); return; }

    wrap.innerHTML = items.map(function (entry) {
      var it = entry.item;
      return '<a class="qrx-sector-card" href="' + href(it) + '" target="_blank" rel="noopener">' +
        img(imgOf(it), 'qrx-sector-img') +
        '<span>' + esc(entry.label) + '</span>' +
        '<strong>' + esc(it.title || '') + '</strong>' +
      '</a>';
    }).join('');
    wireImgs(front);
  }

  function loadSectors(front){
    Promise.all(SECTORS.map(function (s) {
      return getJSON(API + '/api/news-feed?category=' + encodeURIComponent(s[0]))
        .then(function (d) {
          var item = d && d.items && d.items[0];
          return item ? { label:s[1], item:item } : null;
        })
        .catch(function () { return null; });
    })).then(function (cards) { renderSectorCards(front, cards); });
  }

  function renderMainstream(front, items){
    var wrap = front.querySelector('.qrx-main-grid');
    var top = (items || []).slice(0, 4);
    if (!wrap) return;
    if (!top.length) { removeZone(front, '.qrx-mainstream-zone'); return; }

    wrap.innerHTML = top.map(function (it) {
      return '<a class="qrx-main-card" href="' + href(it) + '" target="_blank" rel="noopener">' +
        img(imgOf(it), 'qrx-main-img') +
        '<span class="qrx-main-src">' + esc(meta(it) || it.source || '') + '</span>' +
        '<strong>' + esc(it.title || '') + '</strong>' +
      '</a>';
    }).join('');
    wireImgs(front);
  }

  function renderDraw(front, items){
    var wrap = front.querySelector('.qrx-draw-list');
    var top = (items || []).slice(0, 7);
    if (!wrap) return;
    if (!top.length) { removeZone(front, '.qrx-draw-zone'); return; }

    wrap.innerHTML = top.map(function (it) {
      return '<a class="qrx-draw-row" href="' + href(it) + '" target="_blank" rel="noopener">' +
        '<strong>' + esc(it.title || '') + '</strong>' +
        '<span class="qrx-draw-meta">' + esc(meta(it)) + '</span>' +
      '</a>';
    }).join('');
  }

  function renderDisclosures(front, items){
    var wrap = front.querySelector('.qrx-exploit-list');
    var top = (items || []).slice(0, 6);
    if (!wrap) return;
    if (!top.length) { removeZone(front, '.qrx-exploit-wrap'); return; }

    wrap.innerHTML = top.map(function (it) {
      return '<a class="qrx-exploit-row" href="' + href(it) + '" target="_blank" rel="noopener">' +
        '<span class="qrx-ew-badge-row">' +
          '<span class="qrx-ew-badge">' + esc(it.item_type || 'Finding') + '</span>' +
          '<span class="qrx-ew-badge qrx-ew-badge-src">' + esc(it.source || '') + '</span>' +
        '</span>' +
        '<strong>' + esc(it.title || '') + '</strong>' +
        (it.target ? '<span class="qrx-ew-target">' + esc(it.target) + '</span>' : '') +
      '</a>';
    }).join('');
  }

  function buildFront(){
    if (built) return;
    if (!document.body || !document.body.classList.contains('home-template')) return;

    var viewport = document.querySelector('.gh-viewport');
    if (!viewport) return;
    if (document.querySelector('.qrx-front-v2')) { built = true; return; }
    built = true;

    var front = document.createElement('div');
    front.className = 'qrx-front-v2';
    front.style.display = 'none';
    front.innerHTML = SKELETON;

    var hero = document.querySelector('.qrx-hero');
    if (hero && hero.parentNode) {
      hero.parentNode.insertBefore(front, hero.nextSibling);
    } else {
      var nav = viewport.querySelector('.gh-navigation');
      if (nav) viewport.insertBefore(front, nav.nextSibling);
      else viewport.insertBefore(front, viewport.firstChild);
    }

    try {
      var dt = front.querySelector('.qrx-date');
      if (dt) dt.textContent = new Date().toLocaleDateString(undefined, { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    } catch (e) {}

    getJSON(API + '/api/news-feed?category=hot').then(function (d) {
      var items = (d && d.items) || [];
      if (!items.length || !renderTop(front, items)) { front.remove(); return; }
      front.style.display = '';
    }).catch(function () { front.remove(); });

    getJSON(API + '/api/weekly-feed')
      .then(function (d) { renderWeekly(front, d && d.current && d.current.stories); })
      .catch(function () { removeZone(front, '.qrx-briefing-rail'); });

    loadSectors(front);

    getJSON(API + '/api/mainstream-feed')
      .then(function (d) { renderMainstream(front, (d && d.items) || []); })
      .catch(function () { removeZone(front, '.qrx-mainstream-zone'); });

    getJSON(API + '/api/draw-feed?tab=main')
      .then(function (d) { renderDraw(front, (d && d.items) || []); })
      .catch(function () { removeZone(front, '.qrx-draw-zone'); });

    getJSON(API + '/api/exploit-watch-feed')
      .then(function (d) { renderDisclosures(front, (d && d.items) || []); })
      .catch(function () { removeZone(front, '.qrx-exploit-wrap'); });
  }

  // Label Ghost's native homepage post feed (.gh-feed, Source theme) as
  // "Featured Articles". Injected inside .gh-container so it aligns with
  // the post grid. Sits below the whole Signal Desk framework.
  function labelFeed(){
    if (labeled) return;
    if (!document.body || !document.body.classList.contains('home-template')) return;
    if (document.querySelector('.qrx-featured-head')) { labeled = true; return; }

    var feed = document.querySelector('.gh-feed');
    var parent, before;
    if (feed && feed.parentNode) {
      parent = feed.parentNode;
      before = feed;
    } else {
      var main = document.querySelector('.gh-main');
      if (!main) return;
      parent = main;
      before = main.firstChild;
    }

    var head = document.createElement('div');
    head.className = 'qrx-featured-head';
    head.innerHTML = '<span>Featured Articles</span>';
    parent.insertBefore(head, before);
    labeled = true;
  }

  function run(){ buildFront(); labelFeed(); }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
  window.addEventListener('load', run);

  var fobs = new MutationObserver(function () {
    if (document.body && document.body.classList.contains('home-template')) {
      run();
      if (built && labeled) fobs.disconnect();
    }
  });
  fobs.observe(document.documentElement, { childList:true, subtree:true });
})();
</script>
